name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26"

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests (including browser E2E)
        run: make release-check

      - name: Build binary (with embedded version)
        run: make build

      - name: Verify --version matches VERSION file
        run: |
          VERSION=$(cat VERSION)
          BINARY_VER=$(./eitri --version)
          if [ "$BINARY_VER" != "$VERSION" ]; then
            echo "Version mismatch: VERSION=$VERSION, binary reports $BINARY_VER"
            exit 1
          fi
          echo "Binary version: $BINARY_VER ✓"
